<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Historical Atlas — Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* ============ shadcn-flavored tokens ============ */
:root{
  --background:#ffffff; --foreground:#18181b;
  --card:#ffffff; --muted:#f4f4f5; --muted-2:#fafafa;
  --muted-foreground:#71717a; --border:#e4e4e7; --input:#e4e4e7;
  --ring:#a1a1aa; --primary:#18181b; --primary-foreground:#fafafa;
  --radius:8px;
  --g-polity:#b4543f; --g-place:#2f7d6b; --g-event:#b07d23; --g-economy:#3f6db4; --g-culture:#7a57ad;
  --g-polity-bg:#f7ece9; --g-place-bg:#e7f1ee; --g-event-bg:#f6efe0; --g-economy-bg:#e9eff8; --g-culture-bg:#f1ebf7;
  --map-water:#eef1f4; --map-land:#e2e7ec; --map-coast:#c5ccd5; --map-grid:#e6eaef;
  --lrow-py:10px; --pad:16px;
}
[data-theme="parchment"]{
  --background:#f6f1e6; --foreground:#2f2a20;
  --card:#fbf7ee; --muted:#ece3d2; --muted-2:#f2ebdc;
  --muted-foreground:#8a7e66; --border:#e2d8c2; --input:#ddd2b9;
  --primary:#2f2a20; --primary-foreground:#faf6ec;
  --g-polity-bg:#f0e3da; --g-place-bg:#e3eee6; --g-event-bg:#f1e8d2; --g-economy-bg:#e3ebf2; --g-culture-bg:#ece2f0;
  --map-water:#ede4d0; --map-land:#e4dac1; --map-coast:#cabf9d; --map-grid:#e6dcc6;
}
[data-theme="dark"]{
  --background:#0b0b0d; --foreground:#e8e8ea;
  --card:#161618; --muted:#1f1f23; --muted-2:#141417;
  --muted-foreground:#8b8b93; --border:#27272a; --input:#2a2a2e;
  --primary:#e8e8ea; --primary-foreground:#161618;
  --g-polity:#cf6b53; --g-place:#46a08a; --g-event:#cba04a; --g-economy:#5a8ad6; --g-culture:#a07bd0;
  --g-polity-bg:#2a1d19; --g-place-bg:#142420; --g-event-bg:#28220f; --g-economy-bg:#15202e; --g-culture-bg:#221a2b;
  --map-water:#111116; --map-land:#1b1b21; --map-coast:#34343d; --map-grid:#19191f;
}
[data-accent="gray"]{
  --g-polity:#52525b; --g-place:#71717a; --g-event:#3f3f46; --g-economy:#6b7280; --g-culture:#8a8a93;
  --g-polity-bg:#f1f1f3; --g-place-bg:#f1f1f3; --g-event-bg:#f1f1f3; --g-economy-bg:#f1f1f3; --g-culture-bg:#f1f1f3;
}
[data-theme="dark"][data-accent="gray"]{ --g-polity-bg:#1f1f23; --g-place-bg:#1f1f23; --g-event-bg:#1f1f23; --g-economy-bg:#1f1f23; --g-culture-bg:#1f1f23; }
[data-density="calm"]{ --lrow-py:14px; --pad:20px; }
[data-density="dense"]{ --lrow-py:6px; --pad:12px; }

*{ box-sizing:border-box; }
body{ margin:0; font-family:'Geist',ui-sans-serif,system-ui,sans-serif; color:var(--foreground); -webkit-font-smoothing:antialiased; }
.mono{ font-family:'Geist Mono',ui-monospace,monospace; font-variant-numeric:tabular-nums; }
.muted-fg{ color:var(--muted-foreground); }
.grow{ flex:1; }

/* ============ atoms ============ */
.wf-btn{ display:inline-flex;align-items:center;justify-content:center;gap:6px;height:36px;padding:0 14px;border-radius:var(--radius);font:500 13px/1 'Geist';border:1px solid transparent;cursor:pointer;color:var(--foreground);background:transparent;transition:background .14s,border-color .14s;white-space:nowrap; }
.wf-btn.sz-sm{ height:30px;padding:0 10px;font-size:12px;border-radius:7px; }
.wf-btn.sz-icon{ width:36px;padding:0; }
.wf-btn.sz-icon.sz-sm{ width:30px; }
.is-default{ background:var(--primary);color:var(--primary-foreground); }
.is-default:hover{ opacity:.9; }
.is-secondary{ background:var(--muted); }
.is-outline{ border-color:var(--border);background:var(--card); }
.is-outline:hover,.is-ghost:hover{ background:var(--muted); }
.ic{ flex:none; }

.wf-badge{ display:inline-flex;align-items:center;gap:5px;height:21px;padding:0 8px;border-radius:999px;font:500 11px/1 'Geist';background:var(--muted);color:var(--muted-foreground);border:1px solid transparent;white-space:nowrap; }
.wf-badge.outline{ background:transparent;border-color:var(--border); }
.dot{ width:7px;height:7px;border-radius:999px;flex:none;display:inline-block; }

.wf-card{ background:var(--card);border:1px solid var(--border);border-radius:14px; }
.wf-sep{ height:1px;background:var(--border);border:0;width:100%;flex:none; }
.wf-sep.v{ width:1px;height:auto;align-self:stretch; }
.wf-input{ height:36px;border:1px solid var(--input);border-radius:var(--radius);background:var(--card);padding:0 12px;font:400 13px 'Geist';color:var(--foreground);width:100%;outline:none; }
.wf-input::placeholder{ color:var(--muted-foreground); }

.wf-tabs{ display:inline-flex;background:var(--muted);border-radius:9px;padding:3px;gap:2px; }
.wf-tab{ appearance:none;border:0;background:transparent;height:28px;padding:0 12px;border-radius:6px;font:500 12px 'Geist';color:var(--muted-foreground);cursor:pointer; }
.wf-tab.is-active{ background:var(--card);color:var(--foreground);box-shadow:0 1px 2px rgba(0,0,0,.07); }
.full-tabs{ display:flex;width:100%; } .full-tabs .wf-tab{ flex:1; }

.sk{ background:var(--muted);border-radius:6px;height:10px;position:relative;overflow:hidden; }
.sk::after{ content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);transform:translateX(-100%);animation:sk 1.8s infinite; }
[data-theme="dark"] .sk::after{ background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent); }
@keyframes sk{ 100%{ transform:translateX(100%); } }
.wf-kbd{ font:500 10px 'Geist Mono';background:var(--muted);border:1px solid var(--border);border-bottom-width:2px;border-radius:5px;padding:2px 5px;color:var(--muted-foreground); }

/* ============ map ============ */
.map-canvas{ position:relative;height:100%;width:100%;overflow:hidden;background:var(--map-water); }
.map-svg{ position:absolute;inset:0;width:100%;height:100%; }
.map-overlay{ position:absolute;inset:0; }
.map-canvas.is-dim .map-svg{ filter:saturate(.85); }
.map-canvas.is-dim::after{ content:'';position:absolute;inset:0;background:rgba(0,0,0,.16);backdrop-filter:blur(1px); }
.map-year{ position:absolute;left:16px;bottom:14px;display:flex;flex-direction:column;gap:2px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 12px;box-shadow:0 2px 8px rgba(0,0,0,.06);z-index:4; }
.map-era{ font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted-foreground); }
.map-year-num{ font:500 17px 'Geist Mono';color:var(--foreground); }
.map-attrib{ position:absolute;right:12px;bottom:10px;font-size:10px;color:var(--muted-foreground);background:color-mix(in srgb,var(--card) 80%,transparent);padding:2px 7px;border-radius:6px; }

.pin{ position:absolute;transform:translate(-50%,-100%);display:flex;flex-direction:column;align-items:center;gap:4px; }
.pin-head{ width:20px;height:20px;border-radius:50% 50% 50% 0;transform:rotate(45deg);border:2.5px solid var(--card);box-shadow:0 2px 5px rgba(0,0,0,.28);display:flex;align-items:center;justify-content:center; }
.pin-dot{ width:6px;height:6px;border-radius:50%;background:var(--card);transform:rotate(-45deg); }
.pin.selected{ z-index:5; }
.pin.selected .pin-head{ width:26px;height:26px; }
.pin-label{ background:var(--card);border:1px solid var(--border);border-radius:6px;padding:2px 7px;font:500 11px 'Geist';box-shadow:0 1px 3px rgba(0,0,0,.1);white-space:nowrap; }

.terr-svg,.route-svg{ position:absolute;inset:0;width:100%;height:100%; }
.terr-chip{ position:absolute;transform:translate(-50%,-50%);display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:999px;border:1px solid;font:500 11px 'Geist';box-shadow:0 1px 4px rgba(0,0,0,.08);z-index:4; }
.map-callout{ position:absolute;transform:translate(-50%,0);width:184px;padding:11px 12px;box-shadow:0 6px 20px rgba(0,0,0,.14);z-index:6; }
.mc-top{ display:flex;align-items:center;justify-content:space-between; }
.mc-year{ font-size:11px;color:var(--muted-foreground); }

/* ============ shell ============ */
.shell{ display:flex;flex-direction:column;height:100%;width:100%;background:var(--background);overflow:hidden; }
.shell-topbar{ height:54px;flex:none;display:flex;align-items:center;gap:14px;padding:0 16px;border-bottom:1px solid var(--border);background:var(--card); }
.brand{ display:flex;align-items:center;gap:8px; }
.brand-mark{ width:30px;height:30px;border-radius:8px;background:var(--primary);color:var(--primary-foreground);display:flex;align-items:center;justify-content:center; }
.brand-name{ font:700 15px 'Geist';letter-spacing:.14em; }
.brand-tag{ margin-left:2px; }
.omni{ flex:1;max-width:520px;margin:0 auto;display:flex;align-items:center;gap:9px;height:38px;padding:0 12px;border:1px solid var(--border);border-radius:9px;background:var(--muted-2);color:var(--muted-foreground);cursor:pointer;font:400 13px 'Geist'; }
.omni-ph{ flex:1;text-align:left; }
.topbar-right{ display:flex;align-items:center;gap:8px; }
.seg{ display:inline-flex;background:var(--muted);border-radius:8px;padding:3px; }
.seg-b{ display:inline-flex;align-items:center;gap:5px;border:0;background:transparent;height:28px;padding:0 10px;border-radius:6px;font:500 12px 'Geist';color:var(--muted-foreground);cursor:pointer; }
.seg-b.is-on{ background:var(--card);color:var(--foreground);box-shadow:0 1px 2px rgba(0,0,0,.07); }
.avatar{ width:30px;height:30px;border-radius:999px;background:var(--muted);border:1px solid var(--border); }

.shell-body{ flex:1;display:flex;min-height:0; }
.shell-main{ flex:1;position:relative;min-width:0; }
.shell-aside{ width:344px;flex:none;border-left:1px solid var(--border);background:var(--card);display:flex;flex-direction:column;min-height:0; }
.shell-aside.left{ border-left:0;border-right:1px solid var(--border);order:-1; }
.shell-timeline{ height:94px;flex:none;border-top:1px solid var(--border);background:var(--card); }

/* aside content */
.aside-body{ display:flex;flex-direction:column;height:100%;min-height:0;overflow:hidden; }
.aside-head{ padding:12px var(--pad);border-bottom:1px solid var(--border); }
.aside-pad{ padding:14px var(--pad); }
.aside-search{ position:relative;margin-bottom:11px; }
.asx{ position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted-foreground); }
.chips{ display:flex;flex-wrap:wrap;gap:6px; }
.chip{ display:inline-flex;align-items:center;gap:5px;height:26px;padding:0 9px;border-radius:999px;border:1px solid var(--border);background:var(--card);font:500 11px 'Geist';color:var(--muted-foreground);cursor:pointer; }
.chip.is-on{ border-color:transparent; }
.aside-subhead{ display:flex;align-items:center;justify-content:space-between;padding:9px var(--pad);font:500 11px 'Geist';text-transform:uppercase;letter-spacing:.05em;color:var(--muted-foreground); }
.list{ overflow:hidden;flex:1; }
.lrow{ display:flex;align-items:center;gap:11px;width:100%;border:0;background:transparent;text-align:left;padding:var(--lrow-py) var(--pad);cursor:pointer;border-bottom:1px solid var(--border); }
.lrow:hover{ background:var(--muted-2); }
.lrow.is-sel{ background:var(--muted); }
.lrow-dot{ width:9px;height:9px; }
.lrow-main{ flex:1;display:flex;flex-direction:column;gap:7px;min-width:0; }
.lrow-meta{ display:flex;align-items:center;gap:7px; }
.lrow-span{ font-size:11px;color:var(--muted-foreground); }
.lrow-chev{ color:var(--muted-foreground); }

/* detail */
.detail-bar{ display:flex;align-items:center;justify-content:space-between;padding:10px var(--pad);border-bottom:1px solid var(--border); }
.link-back{ display:inline-flex;align-items:center;gap:5px;border:0;background:transparent;color:var(--muted-foreground);font:500 12px 'Geist';cursor:pointer;padding:0; }
.detail-acts{ display:flex;align-items:center;gap:2px; }
.detail-top{ }
.detail-chips{ display:flex;flex-wrap:wrap;gap:7px;margin-top:13px; }
.meta-chip{ display:inline-flex;align-items:center;gap:5px;height:24px;padding:0 9px;border-radius:7px;border:1px solid var(--border);background:var(--muted-2);font:500 11px 'Geist';color:var(--muted-foreground); }
.meta-chip.warn{ color:var(--g-event);border-color:color-mix(in srgb,var(--g-event) 40%,var(--border));background:var(--g-event-bg); }
.stat-grid{ display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden; }
.stat-grid.three{ grid-template-columns:1fr 1fr 1fr; }
.stat-cell{ background:var(--card);padding:10px 11px;display:flex;flex-direction:column;gap:5px; }
.stat-label{ font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted-foreground); }
.stat-val{ font-size:13px;font-weight:500; }
.sect-h{ margin:0 0 11px;font:600 12px 'Geist';text-transform:uppercase;letter-spacing:.05em;color:var(--muted-foreground);display:flex;align-items:center;gap:7px; }
.count{ font-family:'Geist Mono';background:var(--muted);border-radius:999px;padding:1px 7px;font-size:10px;color:var(--muted-foreground); }
.conn-list{ display:flex;flex-direction:column;gap:9px; }
.conn-row{ display:flex;align-items:center;gap:9px; }
.conn-row .sk{ flex:1; }
.conn-badge{ flex:none; }
.aside-foot{ margin-top:auto;display:flex;align-items:center;gap:6px;padding:11px var(--pad);border-top:1px solid var(--border);font-size:11px;color:var(--muted-foreground); }
.prose-hero{ display:inline-flex;align-items:center;gap:6px;margin-top:11px;font-size:12px;color:var(--muted-foreground); }
.pullquote{ border-left:2px solid var(--border);margin:0 var(--pad);padding:6px 0 6px 14px; }
.inline-stats{ display:flex;justify-content:space-between;gap:10px; }
.istat{ display:flex;flex-direction:column;gap:4px;font-size:13px;font-weight:500; }
.istat-l{ font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted-foreground);font-weight:400; }

/* timeline */
.tl{ display:flex;align-items:center;gap:14px;height:100%;padding:0 18px; }
.tl-standalone{ background:var(--card);border:1px solid var(--border);border-radius:14px; }
.tl-play{ width:38px;height:38px;flex:none;border-radius:999px;border:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--foreground);cursor:pointer; }
.tl-read{ display:flex;flex-direction:column;gap:2px;min-width:118px; }
.tl-year{ font-size:18px;font-weight:500;display:flex;align-items:center;gap:6px; }
.tl-lock{ color:var(--muted-foreground); }
.tl-era{ font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted-foreground); }
.tl-track{ position:relative;flex:1;align-self:stretch;margin:18px 0;border-radius:9px;border:1px solid var(--border);background:var(--muted-2);overflow:hidden; }
.tl-bands{ position:absolute;inset:0;display:flex; }
.tl-bands>span{ display:block;height:100%; }
.tl-bands.tall>span{ display:flex;align-items:flex-start;justify-content:center;padding-top:5px; }
.tl-bands b{ font:600 10px 'Geist';color:var(--muted-foreground);opacity:.75; }
.tl-ticks{ position:absolute;left:8px;right:8px;bottom:16px;display:flex;justify-content:space-between; }
.tk{ width:1px;height:7px;background:var(--border); }
.tk-lg{ height:12px;background:var(--muted-foreground);opacity:.45; }
.tl-handle{ position:absolute;top:0;bottom:0;width:2px;background:var(--foreground);border-radius:2px; }
.tl-knob{ position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:14px;height:14px;border-radius:5px;background:var(--foreground);border:2.5px solid var(--card);box-shadow:0 1px 4px rgba(0,0,0,.32); }
.tl-axis{ position:absolute;left:8px;right:8px;bottom:3px;display:flex;justify-content:space-between;font:400 10px 'Geist Mono';color:var(--muted-foreground); }
.tl-zoom{ display:flex;gap:6px;flex:none; }
.tl-hist{ position:absolute;left:8px;right:8px;top:9px;bottom:18px;display:flex;align-items:flex-end;gap:2px; }
.hbar{ flex:1;border-radius:2px 2px 0 0;min-height:2px; }
.tl-window{ position:absolute;top:0;bottom:16px;background:color-mix(in srgb,var(--foreground) 8%,transparent);border-left:2px solid var(--foreground);border-right:2px solid var(--foreground); }
.tl-handle.range{ width:0;background:transparent; }

/* floating shell */
.shell-float{ position:relative;display:block; }
.shell-float .map-canvas{ height:100%; }
.fl-topleft{ position:absolute;left:16px;top:16px;display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:7px 13px 7px 8px;box-shadow:0 4px 14px rgba(0,0,0,.08);z-index:5; }
.fl-search{ position:absolute;left:50%;top:16px;transform:translateX(-50%);width:340px;margin:0;box-shadow:0 4px 14px rgba(0,0,0,.08);background:var(--card);z-index:5; }
.fl-tools{ position:absolute;right:16px;top:16px;display:flex;gap:8px;z-index:5; }
.fl-aside{ position:absolute;right:16px;top:70px;bottom:96px;width:330px;overflow:hidden;box-shadow:0 12px 34px rgba(0,0,0,.13);z-index:4; }
.fl-timeline{ position:absolute;left:16px;right:362px;bottom:16px;height:88px;box-shadow:0 12px 34px rgba(0,0,0,.13);z-index:4; }
.fl-timeline .tl{ padding:0 16px; }

/* search command */
.screen-rel{ position:relative; }
.cmd-backdrop{ position:absolute;inset:0;display:flex;justify-content:center;padding-top:108px;z-index:20; }
.cmd{ width:560px;height:max-content;align-self:flex-start;box-shadow:0 24px 60px rgba(0,0,0,.26);overflow:hidden; }
.cmd-input{ display:flex;align-items:center;gap:11px;padding:15px 16px;color:var(--muted-foreground); }
.cmd-ph{ font:400 15px 'Geist';color:var(--foreground); }
.cmd-caret{ width:1.5px;height:18px;background:var(--foreground);animation:blink 1.1s step-end infinite; }
@keyframes blink{ 50%{ opacity:0; } }
.cmd-x{ margin-left:auto;border:0;background:var(--muted);width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--muted-foreground);cursor:pointer; }
.cmd-body{ padding:6px; }
.cmd-group{ padding:9px 10px 5px;font:600 10px 'Geist';text-transform:uppercase;letter-spacing:.06em;color:var(--muted-foreground); }
.cmd-row{ display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:8px;cursor:pointer; }
.cmd-row .sk{ flex:1; }
.cmd-row.is-active{ background:var(--muted); }
.cmd-row-span{ font-size:11px;color:var(--muted-foreground);flex:none; }
.cmd-foot{ display:flex;gap:18px;padding:10px 14px;font-size:11px;color:var(--muted-foreground); }
.cmd-foot span{ display:inline-flex;align-items:center;gap:5px; }

/* period highlights */
.ph{ position:absolute;left:50%;bottom:18px;transform:translateX(-50%);width:560px;padding:13px 15px;box-shadow:0 14px 38px rgba(0,0,0,.16);z-index:8; }
.ph-head{ display:flex;align-items:center;gap:10px;margin-bottom:12px; }
.ph-title{ display:inline-flex;align-items:center;gap:7px;font:600 13px 'Geist'; }
.ph-year{ font-size:12px;color:var(--muted-foreground); }
.ph-x{ margin-left:auto;border:0;background:var(--muted);width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--muted-foreground);cursor:pointer; }
.ph-cards{ display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px; }
.ph-card{ border:1px solid var(--border);border-radius:11px;padding:11px;background:var(--card); }
.ph-card-top{ display:flex;align-items:center;justify-content:space-between; }
.ph-tag{ font:600 9px 'Geist';text-transform:uppercase;letter-spacing:.05em;padding:2px 7px;border-radius:999px; }

/* no-geometry banner */
.nogeo-banner{ position:absolute;left:50%;top:18px;transform:translateX(-50%);display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 14px;font:500 12px 'Geist';color:var(--muted-foreground);box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:8; }

/* chronicle */
.chron-head{ display:flex;align-items:center;justify-content:space-between; }
.chron-progress{ display:flex;align-items:center;gap:11px;margin-top:13px; }
.chron-step{ font-size:11px;color:var(--muted-foreground); }
.chron-dots{ display:flex;gap:5px;flex:1; }
.cdot{ flex:1;height:4px;border-radius:2px;background:var(--muted); }
.cdot.done{ background:var(--foreground); }
.cdot.cur{ background:var(--g-polity); }
.chron-nav{ margin-top:auto;display:flex;gap:9px;padding:13px var(--pad);border-top:1px solid var(--border); }

/* ============ kit reference board ============ */
.kit{ padding:22px 24px;height:100%;background:var(--card);display:flex;flex-direction:column;gap:16px;overflow:hidden; }
.kit h3{ margin:0;font:600 13px 'Geist';text-transform:uppercase;letter-spacing:.05em;color:var(--muted-foreground); }
.kit-row{ display:flex;align-items:center;gap:10px;flex-wrap:wrap; }
.kit-legend{ display:flex;gap:18px;flex-wrap:wrap; }
.kit-leg{ display:flex;align-items:center;gap:7px;font:500 13px 'Geist'; }
.kit-leg .dot{ width:11px;height:11px; }
.kit-grid{ display:grid;grid-template-columns:1fr 1fr;gap:22px;flex:1; }
.kit-pinrow{ position:relative;height:54px;flex:1;border:1px dashed var(--border);border-radius:10px;background:var(--muted-2); }

/* ============ phone ============ */
.phone{ width:100%;height:100%;background:var(--background);border:1px solid var(--border);border-radius:30px;overflow:hidden;display:flex;flex-direction:column;position:relative;box-shadow:0 2px 10px rgba(0,0,0,.05); }
.phone-status{ height:34px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-size:12px;font-weight:500;z-index:30;background:transparent; }
.phone-dots{ display:flex;gap:4px; } .phone-dots i{ width:5px;height:5px;border-radius:999px;background:var(--foreground);opacity:.5; }
.phone-screen{ flex:1;position:relative;overflow:hidden; }
.phone-home{ position:absolute;bottom:7px;left:50%;transform:translateX(-50%);width:120px;height:4px;border-radius:999px;background:var(--foreground);opacity:.32;z-index:40; }
.m-map{ position:absolute;inset:0; }
.m-map.short{ bottom:50%; } .m-map.tiny{ bottom:78%; }
.m-top{ position:absolute;top:6px;left:12px;right:12px;display:flex;gap:8px;z-index:20; }
.m-search{ flex:1;display:flex;align-items:center;gap:8px;height:40px;padding:0 13px;border-radius:11px;border:1px solid var(--border);background:var(--card);color:var(--muted-foreground);font:400 13px 'Geist';cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06); }
.m-fab{ width:40px;height:40px;flex:none;border-radius:11px;border:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--foreground);box-shadow:0 2px 8px rgba(0,0,0,.06); }
.m-timeline{ position:absolute;top:54px;left:12px;right:12px;display:flex;align-items:center;gap:9px;height:34px;padding:0 12px;border-radius:10px;background:var(--card);border:1px solid var(--border);z-index:20;box-shadow:0 2px 8px rgba(0,0,0,.05); }
.m-year{ font-size:12px;font-weight:500; }
.m-track{ position:relative;flex:1;height:3px;border-radius:2px;background:var(--muted); }
.m-knob{ position:absolute;top:50%;transform:translate(-50%,-50%);width:13px;height:13px;border-radius:5px;background:var(--foreground);border:2.5px solid var(--card); }
.m-play{ width:24px;height:24px;border-radius:999px;border:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--foreground); }
.m-sheet{ position:absolute;left:0;right:0;bottom:0;background:var(--card);border-top-left-radius:18px;border-top-right-radius:18px;box-shadow:0 -8px 30px rgba(0,0,0,.12);z-index:25;display:flex;flex-direction:column;overflow:hidden; }
.m-sheet.peek{ height:172px; } .m-sheet.half{ height:50%; } .m-sheet.full{ height:88%; }
.m-grab{ width:38px;height:4px;border-radius:999px;background:var(--border);margin:9px auto 4px;flex:none; }
.m-sheet-head{ display:flex;align-items:center;justify-content:space-between;padding:6px 18px 10px; }
.m-sheet-title{ font:600 13px 'Geist'; }
.m-sheet-pad{ padding:12px 18px; }
.m-chips{ display:flex;gap:7px;padding:2px 18px 4px;overflow:hidden; }
.m-list{ overflow:hidden; }
.m-row{ display:flex;align-items:center;gap:11px;padding:11px 18px;border-top:1px solid var(--border); }
.m-row-main{ flex:1;display:flex;flex-direction:column;gap:7px;min-width:0; }
.m-row-meta{ display:flex;align-items:center;gap:7px; }
.m-span{ font-size:11px;color:var(--muted-foreground); }
.m-detail-bar{ display:flex;align-items:center;justify-content:space-between;padding:4px 18px 10px;color:var(--muted-foreground); }
.m-detail-bar .detail-acts{ gap:14px; }

/* ============ top year nav + center group ============ */
.topbar-center{ flex:1;display:flex;align-items:center;gap:10px;justify-content:center;max-width:820px;margin:0 auto; }
.yearnav{ display:flex;align-items:center;gap:5px;height:38px;padding:0 9px;border:1px solid var(--border);border-radius:9px;background:var(--card);flex:none; }
.yearnav-b{ width:24px;height:24px;border:0;background:transparent;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--muted-foreground);cursor:pointer; }
.yearnav-b:hover{ background:var(--muted); }
.yearnav-y{ font-size:13px;font-weight:500;min-width:62px;text-align:center; }
.yearnav-era{ font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted-foreground);padding-left:6px;border-left:1px solid var(--border); }
.cmd-filters{ display:flex;gap:6px;padding:9px 12px;flex-wrap:wrap; }

/* ============ shell option D (list / map / detail+timeline) ============ */
.shell-rail{ width:296px;flex:none;border-right:1px solid var(--border);background:var(--card);display:flex;flex-direction:column;min-height:0; }
.shell-detail{ width:372px;flex:none;border-left:1px solid var(--border);background:var(--card);display:flex;flex-direction:column;min-height:0;overflow:hidden; }
.rail-timeline{ flex:none;border-bottom:1px solid var(--border);padding:14px 16px; }
.mtl{ display:flex;flex-direction:column;gap:11px; }
.mtl-top{ display:flex;align-items:center;gap:10px; }
.tl-play.sm{ width:30px;height:30px; }
.mtl-read{ flex:1;display:flex;flex-direction:column;gap:1px; }
.mtl-year{ font-size:15px;font-weight:500; }
.mtl-era{ font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted-foreground); }
.mtl-zoom{ display:flex;gap:5px; }
.mtl-track{ position:relative;height:42px;border:1px solid var(--border);border-radius:8px;background:var(--muted-2);overflow:hidden; }
.mtl-track .tl-ticks{ display:none; }

/* ============ chronicle (vertical scroll) ============ */
.chron-doc{ height:100%;width:100%;background:var(--background);display:flex;flex-direction:column;overflow:hidden; }
.cdoc-top{ height:56px;flex:none;display:flex;align-items:center;gap:13px;padding:0 22px;border-bottom:1px solid var(--border);background:var(--card); }
.cdoc-title{ font:600 14px 'Geist'; }
.cdoc-progress{ margin-left:auto;width:180px;height:4px;border-radius:2px;background:var(--muted);position:relative;overflow:hidden; }
.cdoc-progress::after{ content:'';position:absolute;left:0;top:0;bottom:0;width:38%;background:var(--foreground); }
.cdoc-step-count{ font:500 12px 'Geist Mono';color:var(--muted-foreground); }
.cdoc-body{ flex:1;overflow:hidden; }
.minimap{ position:relative;border-radius:11px;overflow:hidden;border:1px solid var(--border);background:var(--map-water); }
.minimap .map-svg{ position:absolute;inset:0;width:100%;height:100%; }
.railmode{ padding:30px 34px; }
.cstep{ display:grid;grid-template-columns:196px 1fr;gap:30px;position:relative; }
.cstep-rail{ position:relative;padding-left:26px;padding-bottom:36px; }
.cstep:last-child .cstep-rail{ padding-bottom:8px; }
.cstep-rail::before{ content:'';position:absolute;left:5px;top:7px;bottom:0;width:2px;background:var(--border); }
.cstep:last-child .cstep-rail::before{ display:none; }
.cstep-node{ position:absolute;left:0;top:3px;width:12px;height:12px;border-radius:50%;border:2px solid var(--card); }
.cstep-date{ font-size:13px;font-weight:500;display:block; }
.cstep-meta{ display:flex;flex-direction:column;gap:9px;margin-top:12px;align-items:flex-start; }
.cmeta-row{ display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted-foreground); }
.cstep-content{ padding-bottom:36px; }
.stickymode{ display:grid;grid-template-columns:1fr 1fr;height:100%; }
.cscroll{ padding:32px 36px;display:flex;flex-direction:column;gap:36px;overflow:hidden; }
.cbeat{ border-left:2px solid var(--border);padding-left:18px; }
.cbeat.is-active{ border-color:var(--foreground); }
.cbeat-date{ font-size:13px;font-weight:500;display:block;margin-bottom:9px; }
.csticky{ position:relative;border-left:1px solid var(--border);background:var(--muted-2);display:flex;align-items:center;justify-content:center;padding:30px; }
.csticky-chip{ position:absolute;left:42px;bottom:42px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 11px;font:500 12px 'Geist';box-shadow:0 2px 8px rgba(0,0,0,.08); }
.streammode{ padding:28px;display:flex;flex-direction:column;gap:22px;align-items:center;overflow:hidden; }
.cfeed{ width:640px;max-width:100%;display:grid;grid-template-columns:96px 1fr;overflow:hidden; }
.cfeed-gutter{ background:var(--muted-2);border-right:1px solid var(--border);padding:20px 12px;display:flex;flex-direction:column;gap:11px;align-items:center; }
.cfeed-gutter .cstep-node{ position:static; }
.cfeed-date{ font-size:12px;font-weight:500;text-align:center; }
.cfeed-rule{ flex:1;width:2px;background:var(--border);border-radius:2px;min-height:24px; }
.cfeed-body{ padding:20px; }
.cfeed-head{ display:flex;align-items:center;gap:12px;margin-bottom:14px; }
.cfeed-prose{ margin-top:14px; }

/* curated high-importance left rail */
.scope-note{ display:flex;align-items:center;gap:6px;margin-top:11px;font-size:11px;color:var(--muted-foreground); }
.scope-dot{ opacity:.5; }
.aside-subhead .subhead-l{ display:inline-flex;align-items:center;gap:6px; }
.prom{ display:flex;align-items:flex-end;gap:2px;height:14px;flex:none; }
.prom i{ width:3px;border-radius:1px;background:var(--border); }
.prom i:nth-child(1){ height:6px; }
.prom i:nth-child(2){ height:10px; }
.prom i:nth-child(3){ height:14px; }
.prom.p1 i:nth-child(1){ background:var(--muted-foreground); }
.prom.p2 i:nth-child(-n+2){ background:var(--muted-foreground); }
.prom.p3 i{ background:var(--foreground); }
.list-more{ display:flex;align-items:center;justify-content:center;gap:6px;width:100%;border:0;border-top:1px solid var(--border);background:var(--card);padding:13px;font:500 12px 'Geist';color:var(--muted-foreground);cursor:pointer;flex:none; }
.list-more:hover{ background:var(--muted-2); }
.cbeat-meta{ display:flex;align-items:center;gap:11px;margin-top:9px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="wf-kit.jsx"></script>
<script type="text/babel" src="wf-screens.jsx"></script>
<script type="text/babel" src="wf-detail.jsx"></script>
<script type="text/babel" src="wf-mobile.jsx"></script>
<script type="text/babel" src="wf-chronicle.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakToggle } = window;
const { Btn, Badge, Dot, Input, Tabs, Sk, GROUPS, GROUP_ORDER, Icon, Pin } = window;

function KitBoard(){
  return (
    <div className="kit">
      <h3>Entity groups</h3>
      <div className="kit-legend">
        {GROUP_ORDER.map(g => (
          <span key={g} className="kit-leg"><span className="dot" style={{background:GROUPS[g].v}} />{GROUPS[g].label}</span>
        ))}
      </div>
      <div className="wf-sep" />
      <div className="kit-grid">
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <h3>Controls</h3>
          <div className="kit-row">
            <Btn variant="default">Primary</Btn>
            <Btn variant="secondary">Secondary</Btn>
            <Btn variant="outline">Outline</Btn>
            <Btn variant="ghost">Ghost</Btn>
          </div>
          <div className="kit-row">
            <Badge group="polity" /><Badge group="event" /><Badge variant="outline">Outline</Badge>
            <Tabs items={['Browse','Chronicles']} />
          </div>
          <Input placeholder="Input field…" />
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <h3>Placeholders &amp; pins</h3>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            <Sk h={11} w="90%" /><Sk h={11} w="78%" /><Sk h={11} w="84%" />
          </div>
          <div className="kit-row">
            <div className="kit-pinrow">
              <Pin group="polity" x={20} y={70} /><Pin group="place" x={42} y={70} />
              <Pin group="event" x={62} y={70} selected /><Pin group="culture" x={84} y={70} />
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "parchment",
  "accent": true,
  "density": "regular"
}/*EDITMODE-END*/;

function App(){
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  React.useEffect(() => {
    const r = document.documentElement;
    r.setAttribute('data-theme', t.theme);
    r.setAttribute('data-accent', t.accent ? 'color' : 'gray');
    r.setAttribute('data-density', t.density);
  }, [t.theme, t.accent, t.density]);

  return (
    <React.Fragment>
      <DesignCanvas>
        <DCSection id="kit" title="Wireframe kit" subtitle="shadcn atoms · five entity groups (muted cartographic accents)">
          <DCArtboard id="legend" label="Legend & components" width={760} height={340}><KitBoard /></DCArtboard>
        </DCSection>

        <DCSection id="shell" title="Shell layout" subtitle="Where map, aside & timeline sit — and which side the aside docks">
          <DCArtboard id="shell-r" label="A · Aside right (default)" width={1200} height={760}><window.ShellRight /></DCArtboard>
          <DCArtboard id="shell-l" label="B · Aside left" width={1200} height={760}><window.ShellLeft /></DCArtboard>
          <DCArtboard id="shell-f" label="C · Floating panels (immersive map)" width={1200} height={760}><window.ShellFloat /></DCArtboard>
          <DCArtboard id="shell-ld" label="D · List left · map · detail + timeline right" width={1340} height={760}><window.ShellListDetail /></DCArtboard>
        </DCSection>

        <DCSection id="core" title="Core screens" subtitle="Default browse · search · period highlights">
          <DCArtboard id="s-default" label="Default — browse within view" width={1200} height={760}><window.ScreenDefault /></DCArtboard>
          <DCArtboard id="s-search" label="Search — command palette" width={1200} height={760}><window.ScreenSearch /></DCArtboard>
          <DCArtboard id="s-high" label="Period Highlights — on year change" width={1200} height={760}><window.ScreenHighlights /></DCArtboard>
        </DCSection>

        <DCSection id="select" title="Selection states" subtitle="How a chosen entity renders on the map">
          <DCArtboard id="s-point" label="Point marker" width={1200} height={760}><window.ScreenPoint /></DCArtboard>
          <DCArtboard id="s-terr" label="Territory highlight" width={1200} height={760}><window.ScreenTerritory /></DCArtboard>
          <DCArtboard id="s-nogeo" label="No geometry — unmapped entity" width={1200} height={760}><window.ScreenNoGeom /></DCArtboard>
        </DCSection>

        <DCSection id="panel" title="Entity detail panel" subtitle="Three takes on the stats + prose aside">
          <DCArtboard id="p-stats" label="D1 · Stats-first" width={356} height={760}><div className="panel-frame" style={{height:'100%',background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,overflow:'hidden'}}><window.PanelStats /></div></DCArtboard>
          <DCArtboard id="p-prose" label="D2 · Prose / narrative" width={356} height={760}><div className="panel-frame" style={{height:'100%',background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,overflow:'hidden'}}><window.PanelProse /></div></DCArtboard>
          <DCArtboard id="p-tab" label="D3 · Tabbed" width={356} height={760}><div className="panel-frame" style={{height:'100%',background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,overflow:'hidden'}}><window.PanelTabbed /></div></DCArtboard>
        </DCSection>

        <DCSection id="timeline" title="Timeline scrubber" subtitle="Classic ticks · density histogram · range window">
          <DCArtboard id="t-classic" label="T1 · Classic ticks + era bands" width={1100} height={150}><window.ScrubClassic /></DCArtboard>
          <DCArtboard id="t-hist" label="T2 · Density histogram" width={1100} height={150}><window.ScrubHistogram /></DCArtboard>
          <DCArtboard id="t-range" label="T3 · Era bands + range window" width={1100} height={150}><window.ScrubRange /></DCArtboard>
        </DCSection>

        <DCSection id="chronicle" title="Chronicle tour" subtitle="Two directions you liked — paged guided step, and single-map scrollytelling">
          <DCArtboard id="s-chron" label="C0 · Guided step — paged (map shell, year locked)" width={1200} height={760}><window.ScreenChronicle /></DCArtboard>
          <DCArtboard id="c-sticky" label="C2 · Scrollytelling — beats scroll left, one map stays sticky right" width={1120} height={760}><window.ChronicleSticky /></DCArtboard>
        </DCSection>

        <DCSection id="mobile" title="Mobile · bottom-sheet behavior" subtitle="Peek → half → full detail">
          <DCArtboard id="m-peek" label="M1 · Collapsed peek" width={390} height={800}><window.MobilePeek /></DCArtboard>
          <DCArtboard id="m-half" label="M2 · Half sheet (browse)" width={390} height={800}><window.MobileHalf /></DCArtboard>
          <DCArtboard id="m-full" label="M3 · Full sheet (detail)" width={390} height={800}><window.MobileFull /></DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakRadio label="Surface" value={t.theme} options={['light','parchment','dark']} onChange={(v)=>setTweak('theme',v)} />
        <TweakToggle label="Color accents" value={t.accent} onChange={(v)=>setTweak('accent',v)} />
        <TweakSection label="Density" />
        <TweakRadio label="Edge density" value={t.density} options={['calm','regular','dense']} onChange={(v)=>setTweak('density',v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
