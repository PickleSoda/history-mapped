name: CI

# Mirrors the "Pull Request" and "Main Branch Build" pipelines described in
# docs/implementation-docs/deployment_*.md.
#
#   pull_request  -> lint + typecheck + build + test  (no publish)
#   push to main  -> all of the above, then build & push container images
#
# The `images` job builds docker/api/Dockerfile.prod (multi-stage, --no-dev,
# compiled assets, opcache) and pushes to GHCR tagged with the commit SHA.

on:
  pull_request:
  push:
    branches: [main]

# One run per branch; cancel superseded runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PNPM_VERSION: "10.6.3"   # keep in sync with package.json "packageManager"
  NODE_VERSION: "20"
  PHP_VERSION: "8.4"       # keep in sync with docker/api/Dockerfile

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Frontend: the pnpm workspace (web SPA + api Inertia admin UI).
  # One install covers both packages.
  # ───────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint · types · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --- web SPA ---------------------------------------------------------
      - name: web · lint
        run: pnpm --filter @history-mapped/web lint

      - name: web · typecheck
        run: pnpm --filter @history-mapped/web run types:check

      - name: web · build
        run: pnpm --filter @history-mapped/web build

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.sha }}
          path: web/dist
          if-no-files-found: error
          retention-days: 7

      # --- api Inertia admin UI -------------------------------------------
      # The admin UI imports Wayfinder-generated route/action helpers, which are
      # gitignored. Generate them (no DB needed) so lint + typecheck can resolve
      # the @/routes and @/actions modules — otherwise import-order and tsc
      # behave differently in CI than locally.
      - name: Install PHP (Wayfinder generation)
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: bcmath, exif, gd, intl, pcntl, pdo_pgsql, redis, zip
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer/files
          key: composer-${{ runner.os }}-${{ hashFiles('api/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Generate Wayfinder route helpers
        working-directory: api
        run: |
          composer install --no-interaction --prefer-dist --no-progress
          cp .env.example .env
          php artisan key:generate
          php artisan wayfinder:generate --with-form

      - name: admin · lint
        run: pnpm --filter @history-mapped/api run lint:check

      - name: admin · format
        run: pnpm --filter @history-mapped/api run format:check

      - name: admin · typecheck
        run: pnpm --filter @history-mapped/api run types:check

      # Non-blocking: the admin vitest suite currently hits a worker-pool
      # start-up failure (environment, not assertions). Surfaced in the logs
      # but doesn't gate deploys. Flip off once the suite runs cleanly in CI.
      - name: admin · unit tests (vitest)
        continue-on-error: false
        run: pnpm --filter @history-mapped/api exec vitest run --passWithNoTests
        # NOTE: `vite build` for the admin UI is intentionally NOT run here —
        # the Wayfinder plugin needs a live PHP app. It is exercised inside the
        # production image build instead.

  # ───────────────────────────────────────────────────────────────────────────
  # API: Laravel + PHP. Tests run against the real PostGIS + pgvector image,
  # because phpunit.xml uses the pgsql connection and the schema needs both
  # extensions — a vanilla `postgres` service container will not work.
  # ───────────────────────────────────────────────────────────────────────────
  api:
    name: API (pint · migrate · phpunit)
    runs-on: ubuntu-latest

    env:
      # Override the container hostname baked into phpunit.xml (`db` -> CI host).
      # PHPUnit <env> entries do not force-override real OS env vars, so these win.
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      DB_DATABASE: history-mapped_test
      DB_USERNAME: history-mapped
      DB_PASSWORD: secret
      # Redis (cache/session/queue). The permission migration flushes the
      # permission cache, so `migrate` needs a reachable Redis. Overrides the
      # `redis` hostname from .env.example.
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: "6379"

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Build PostGIS + pgvector image
        run: docker build -t history-mapped-db:ci -f docker/db/Dockerfile docker

      - name: Start database
        run: |
          docker run -d --name hm-db \
            -e POSTGRES_DB="$DB_DATABASE" \
            -e POSTGRES_USER="$DB_USERNAME" \
            -e POSTGRES_PASSWORD="$DB_PASSWORD" \
            -v "${{ github.workspace }}/docker/db/init-extensions.sql:/docker-entrypoint-initdb.d/10-extensions.sql:ro" \
            -p 5432:5432 \
            history-mapped-db:ci

      - name: Wait for database
        run: |
          for i in $(seq 1 30); do
            if docker exec hm-db pg_isready -U "$DB_USERNAME" -d "$DB_DATABASE" >/dev/null 2>&1; then
              echo "database ready"; exit 0
            fi
            sleep 2
          done
          echo "::error::database did not become ready"; docker logs hm-db; exit 1

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: bcmath, exif, gd, intl, pcntl, pdo_pgsql, redis, zip
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer/files
          key: composer-${{ runner.os }}-${{ hashFiles('api/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        working-directory: api
        run: composer install --no-interaction --prefer-dist --no-progress --optimize-autoloader

      - name: Prepare environment
        working-directory: api
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Lint (Pint)
        working-directory: api
        run: ./vendor/bin/pint --test

      - name: Run migrations
        working-directory: api
        run: php artisan migrate --force

      - name: Tests
        working-directory: api
        run: php artisan test

  # ───────────────────────────────────────────────────────────────────────────
  # Container images — main branch only. Builds the production API image and
  # pushes it to GHCR tagged with the commit SHA (immutable) + latest.
  # ───────────────────────────────────────────────────────────────────────────
  images:
    name: Build & push images
    if: github.ref == 'refs/heads/main'
    needs: [frontend, api]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # GHCR/Docker require lowercase image names, but `github.repository` keeps
      # the owner's original case (e.g. "PickleSoda/history-mapped"), which makes
      # buildx reject the tag with "repository name must be lowercase". Normalise
      # it once here and reuse it for both push and scan.
      - name: Resolve lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/api" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api/Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan API image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0   # tags are v-prefixed; 0.28.0 (no v) does not exist
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"   # report-only at first; flip to "1" to gate merges

  # ───────────────────────────────────────────────────────────────────────────
  # Deploy to DigitalOcean App Platform — main branch only, and OPT-IN: the job
  # is skipped until you set the repo variable DEPLOY_TO_DO=true
  # (Settings → Secrets and variables → Actions → Variables). It also needs the
  # DIGITALOCEAN_ACCESS_TOKEN secret and an app already created from .do/app.yaml.
  # GHCR images can't use App Platform's deploy-on-push, so this step triggers
  # the deploy after the image is published. See docs/implementation-docs/deployment_runbook.md.
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy (DigitalOcean App Platform)
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_TO_DO == 'true'
    needs: [images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy App Platform app
        uses: digitalocean/app_action/deploy@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          app_name: history-mapped

  # ───────────────────────────────────────────────────────────────────────────
  # Deploy to a DigitalOcean Droplet over SSH — main branch only, and OPT-IN:
  # skipped until you set repo variable DEPLOY_TO_DROPLET=true.
  #
  # Prereqs on the droplet (one-time — see docs/implementation-docs/deployment_runbook.md):
  #   - Docker Engine + Compose plugin installed.
  #   - The repo cloned at $DROPLET_APP_DIR (default /opt/history-mapped),
  #     with docker/.env.prod filled in (it is gitignored, holds secrets).
  # Required secrets: DROPLET_HOST, DROPLET_USER, DROPLET_SSH_KEY.
  # Optional secrets: GHCR_USERNAME + GHCR_TOKEN (only if the GHCR package is
  #   private), DROPLET_SSH_PORT. Optional variable: DROPLET_APP_DIR.
  # ───────────────────────────────────────────────────────────────────────────
  deploy-droplet:
    name: Deploy (DigitalOcean Droplet)
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_TO_DROPLET == 'true'
    needs: [images]
    runs-on: ubuntu-latest
    steps:
      # Deploy the exact image this run built (immutable + rollback-able) rather
      # than chasing :latest. Lowercased to satisfy GHCR.
      - name: Resolve image tag
        run: echo "APP_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/api:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || 22 }}
          script_stop: true
          envs: GHCR_USERNAME,GHCR_TOKEN,APP_DIR,APP_IMAGE
          script: |
            set -euo pipefail
            cd "${APP_DIR:-/opt/history-mapped}"
            export APP_IMAGE="${APP_IMAGE:?image tag not provided}"

            # Pull new sources (compose, Caddyfile, db build context, web/ src).
            BEFORE=$(git rev-parse HEAD)
            git pull --ff-only
            AFTER=$(git rev-parse HEAD)

            # Authenticate to GHCR only if a token is provided (private package).
            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "${GHCR_USERNAME:-}" --password-stdin
            fi

            COMPOSE="docker compose --env-file docker/.env.prod -f docker/docker-compose.prod.yml"

            # Pull the pinned API image.
            $COMPOSE pull app

            # Rebuild the customer SPA only when web/ or the lockfile changed —
            # it's the heaviest step and most deploys are backend-only.
            if ! git diff --quiet "$BEFORE" "$AFTER" -- web/ pnpm-lock.yaml; then
              echo "web/ changed → rebuilding SPA"
              $COMPOSE --profile setup run --rm web-build
            else
              echo "web/ unchanged → skipping SPA rebuild"
            fi

            # Migrate before the new code takes traffic, then roll the services.
            $COMPOSE --profile setup run --rm migrate
            $COMPOSE up -d --remove-orphans

            # Health gate: fail the deploy if the app doesn't become healthy.
            echo "waiting for app to become healthy…"
            for i in $(seq 1 20); do
              status=$(docker inspect -f '{{.State.Health.Status}}' "$($COMPOSE ps -q app)" 2>/dev/null || echo starting)
              [ "$status" = "healthy" ] && { echo "app healthy"; break; }
              if [ "$i" = "20" ]; then
                echo "::error::app did not become healthy after deploy"
                $COMPOSE logs --tail=80 app
                exit 1
              fi
              sleep 3
            done

            docker image prune -f
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          APP_DIR: ${{ vars.DROPLET_APP_DIR }}
          APP_IMAGE: ${{ env.APP_IMAGE }}
