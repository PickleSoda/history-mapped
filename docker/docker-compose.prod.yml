# Production stack for a single DigitalOcean Droplet (or any Docker host).
#
# Pulls the GHCR image published by CI and runs it behind Caddy (auto-HTTPS),
# with self-hosted Postgres (PostGIS + pgvector) and Redis.
#
# Usage:
#   cp docker/.env.prod.example docker/.env.prod   # then fill it in
#   docker login ghcr.io                            # PAT with read:packages (skip if package is public)
#   docker compose --env-file docker/.env.prod -f docker/docker-compose.prod.yml pull
#   docker compose --env-file docker/.env.prod -f docker/docker-compose.prod.yml --profile setup run --rm migrate
#   docker compose --env-file docker/.env.prod -f docker/docker-compose.prod.yml up -d
#
# To point at MANAGED Postgres/Valkey instead, delete the db/redis services and
# set DB_*/REDIS_* in docker/.env.prod to the managed endpoints.

x-app-image: &app_image "${APP_IMAGE:-ghcr.io/picklesoda/history-mapped/api:latest}"

services:
  # ── Edge: TLS termination + reverse proxy (Let's Encrypt via Caddy) ─────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: "${APP_DOMAIN:?set APP_DOMAIN in docker/.env.prod}"
      WEB_DOMAIN: "${WEB_DOMAIN:?set WEB_DOMAIN in docker/.env.prod}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - web_dist:/srv/web:ro      # customer SPA, built by the web-build service
    depends_on:
      - app

  # ── API (FrankenPHP + Octane); serves HTTP on 8080 ──────────────────────────
  app:
    image: *app_image
    restart: unless-stopped
    env_file: [.env.prod]
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@file_get_contents('http://127.0.0.1:8080/up') !== false ? 0 : 1);"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Queue worker (same image, different command) ────────────────────────────
  queue:
    image: *app_image
    restart: unless-stopped
    env_file: [.env.prod]
    command: php artisan queue:work --tries=3 --max-time=3600 --sleep=1
    # Workers don't serve HTTP, so disable the image's inherited HTTP healthcheck
    # (otherwise they're perpetually marked "unhealthy").
    healthcheck:
      disable: true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # ── Scheduler (exactly one replica) ─────────────────────────────────────────
  scheduler:
    image: *app_image
    restart: unless-stopped
    env_file: [.env.prod]
    command: php artisan schedule:work
    # Not an HTTP server — disable the inherited HTTP healthcheck.
    healthcheck:
      disable: true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # ── One-off migration job (run with: --profile setup run --rm migrate) ──────
  #     NOTE: no `route:cache` — /health and /user are closure routes, which
  #     route:cache rejects. config:cache is safe. (Octane registers routes per
  #     worker boot, so route caching buys little here anyway.)
  migrate:
    image: *app_image
    profiles: ["setup"]
    env_file: [.env.prod]
    # The permission migration flushes the Spatie cache (Cache::forget), which
    # would hit Redis. This one-off runs before `up`, so the redis service isn't
    # started yet and the host won't resolve — use the array store to keep
    # migrations independent of the cache backend. (overrides .env.prod)
    environment:
      CACHE_STORE: array
    command: sh -c "php artisan migrate --force && php artisan config:cache"
    depends_on:
      db:
        condition: service_healthy

  # ── Build the customer SPA into the web_dist volume (run via the setup
  #     profile on each deploy); Caddy serves it on WEB_DOMAIN. ────────────────
  web-build:
    image: node:20-bookworm-slim
    profiles: ["setup"]
    working_dir: /repo
    volumes:
      - ..:/repo
      - web_dist:/repo/web/dist
    command: >-
      sh -lc "corepack enable
      && pnpm install --frozen-lockfile --filter @history-mapped/web...
      && pnpm --filter @history-mapped/web build"

  # ── PostgreSQL 16 with PostGIS + pgvector ───────────────────────────────────
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-history-mapped}"
      POSTGRES_USER: "${POSTGRES_USER:-history-mapped}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in docker/.env.prod}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init-extensions.sql:/docker-entrypoint-initdb.d/10-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-history-mapped} -d ${POSTGRES_DB:-history-mapped}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (cache / queue / session) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  web_dist:
