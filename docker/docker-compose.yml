name: wikiglobe

services:
  composer-install:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    working_dir: /var/www/html
    command: composer install --no-interaction --prefer-dist --optimize-autoloader
    volumes:
      - ../api:/var/www/html
      - api_vendor:/var/www/html/vendor
    environment:
      COMPOSER_MEMORY_LIMIT: -1

  app:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    working_dir: /var/www/html
    command: php-fpm
    volumes:
      - ../api:/var/www/html
      - api_vendor:/var/www/html/vendor
    depends_on:
      composer-install:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '${FORWARD_NGINX_PORT:-8000}:80'
    volumes:
      - ../api:/var/www/html
      - ./api/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  pnpm-install:
    build:
      context: ..
      dockerfile: docker/web/Dockerfile
    working_dir: /workspace
    command: sh -lc "pnpm install --no-frozen-lockfile"
    volumes:
      - ..:/workspace
      - root_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/web/node_modules
      - api_node_modules:/workspace/api/node_modules
      - pnpm_store:/pnpm/store

  web:
    build:
      context: ..
      dockerfile: docker/web/Dockerfile
    working_dir: /workspace
    command: pnpm --filter @wikiglobe/web dev
    ports:
      - '${FORWARD_WEB_PORT:-5173}:5173'
    volumes:
      - ..:/workspace
      - root_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/web/node_modules
      - pnpm_store:/pnpm/store
    depends_on:
      pnpm-install:
        condition: service_completed_successfully

  vite-admin:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    working_dir: /workspace/api
    command: pnpm dev
    ports:
      - '${FORWARD_ADMIN_PORT:-5174}:5174'
    volumes:
      - ..:/workspace
      - root_node_modules:/workspace/node_modules
      - api_node_modules:/workspace/api/node_modules
      - api_vendor:/workspace/api/vendor
      - pnpm_store:/pnpm/store
    depends_on:
      composer-install:
        condition: service_completed_successfully
      pnpm-install:
        condition: service_completed_successfully

  db:
    image: '${WG_DB_IMAGE:-wikiglobe-db:16-pgvector-v0.8.2}'
    build:
      context: .
      dockerfile: db/Dockerfile
    ports:
      - '${FORWARD_DB_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: '${POSTGRES_DB:-wikiglobe}'
      POSTGRES_USER: '${POSTGRES_USER:-wikiglobe}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-secret}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init-extensions.sql:/docker-entrypoint-initdb.d/10-extensions.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-wikiglobe} -d ${POSTGRES_DB:-wikiglobe}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '${FORWARD_REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data

  queue:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    working_dir: /var/www/html
    command: php artisan queue:work --verbose --tries=1 --timeout=90
    volumes:
      - ../api:/var/www/html
      - api_vendor:/var/www/html/vendor
    depends_on:
      composer-install:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    working_dir: /var/www/html
    command: >-
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ../api:/var/www/html
      - api_vendor:/var/www/html/vendor
    depends_on:
      composer-install:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_started

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '${FORWARD_MAILPIT_PORT:-8025}:8025'

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    ports:
      - '${FORWARD_CLOUDBEAVER_PORT:-8978}:8978'
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace
    depends_on:
      db:
        condition: service_healthy

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - '${FORWARD_REDISINSIGHT_PORT:-5540}:5540'
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis

volumes:
  api_vendor:
  api_node_modules:
  web_node_modules:
  root_node_modules:
  pnpm_store:
  postgres_data:
  redis_data:
  cloudbeaver_data:
  redisinsight_data:
